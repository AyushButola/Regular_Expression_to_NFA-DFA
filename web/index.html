<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex → NFA → DFA Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Regex Automata Converter</h1>
    </header>
    
    <main>
        <section class="controls">
            <div class="input-row">
                <input type="text" id="regex-input" value="(a|b)*abb" placeholder="Enter regular expression...">
                <button id="convert-btn">Convert</button>
            </div>
            <div id="error-msg"></div>
        </section>

        <section class="visualization">
            <div class="tabs">
                <button class="tab-btn active" data-target="nfa">NFA</button>
                <button class="tab-btn" data-target="dfa">DFA</button>
            </div>

            <div class="player-controls">
                <button id="prev-btn">Prev</button>
                <button id="play-btn">Play</button>
                <button id="next-btn">Next</button>
                <span id="step-counter">0 / 0</span>
                <input type="range" id="speed-slider" min="200" max="2000" value="800" step="100">
                <label for="speed-slider">Speed</label>
            </div>

            <div id="step-desc">Enter a regex and click Convert.</div>
            
            <div class="canvas-wrapper">
                <canvas id="graph-canvas"></canvas>
            </div>
        </section>
    </main>

    <script src="automata.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
